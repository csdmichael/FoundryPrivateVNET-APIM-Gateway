name: deploy-bot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'bot-function/**'
      - 'config/**'
      - '.github/workflows/deploy-bot.yml'

jobs:
  deploy-bot-function:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read config values
        id: config
        shell: bash
        run: |
          cfg="config/azure_resources.json"
          echo "resource_group=$(jq -r '.resource_group' $cfg)" >> "$GITHUB_OUTPUT"
          echo "tax_bot=$(jq -r '.use_cases.tax_pdf_forms.bot_function_app' $cfg)" >> "$GITHUB_OUTPUT"
          echo "eng_bot=$(jq -r '.use_cases.eng_design_ppt.bot_function_app' $cfg)" >> "$GITHUB_OUTPUT"
          echo "tax_bot_url=$(jq -r '.use_cases.tax_pdf_forms.bot_endpoint' $cfg)" >> "$GITHUB_OUTPUT"
          echo "eng_bot_url=$(jq -r '.use_cases.eng_design_ppt.bot_endpoint' $cfg)" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy zip (once)
        shell: bash
        run: |
          rm -rf .deploy/bot-package
          mkdir -p .deploy/bot-package
          cp bot-function/bot_app.py .deploy/bot-package/
          cp bot-function/startup.sh .deploy/bot-package/
          cp bot-function/host.json .deploy/bot-package/
          cp bot-function/requirements.txt .deploy/bot-package/
          cp -R bot-function/health .deploy/bot-package/
          cp -R bot-function/messages .deploy/bot-package/
          cp -R config .deploy/bot-package/
          find .deploy/bot-package -type d -name '__pycache__' -prune -exec rm -rf {} +
          cd .deploy/bot-package && zip -qr ../bot-package.zip . && cd ..

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy both bots in parallel
        shell: bash
        run: |
          RG="${{ steps.config.outputs.resource_group }}"

          deploy_with_retry() {
            local name="$1" rg="$2" src="$3" max=4 delay=30
            for attempt in $(seq 1 $max); do
              if az webapp deploy --name "$name" --resource-group "$rg" \
                   --src-path "$src" --type zip --timeout 300 2>&1; then
                echo "$name deploy succeeded"
                return 0
              fi
              if [ $attempt -lt $max ]; then
                echo "$name deploy failed (attempt $attempt/$max), waiting ${delay}s for in-progress deployment..."
                sleep $delay
              else
                echo "$name deploy failed after $max attempts"
                return 1
              fi
            done
          }

          deploy_with_retry "${{ steps.config.outputs.tax_bot }}" "$RG" .deploy/bot-package.zip &
          PID_TAX=$!

          deploy_with_retry "${{ steps.config.outputs.eng_bot }}" "$RG" .deploy/bot-package.zip &
          PID_ENG=$!

          FAILED=0
          wait $PID_TAX || FAILED=1
          wait $PID_ENG || FAILED=1
          if [ $FAILED -ne 0 ]; then echo "One or both bot deploys failed"; exit 1; fi
          echo "Both bot deploys completed"

      - name: Verify both bot health endpoints
        shell: bash
        run: |
          check_health() {
            local url="$1/api/health"
            local name="$2"
            local max=5 delay=10
            sleep 10
            for attempt in $(seq 1 $max); do
              if curl --fail --silent --show-error "$url"; then
                echo "$name health check passed"
                return 0
              fi
              if [ $attempt -lt $max ]; then
                echo "$name health check failed (attempt $attempt/$max), retrying in ${delay}s..."
                sleep $delay
              else
                echo "$name health check failed after $max attempts"
                return 1
              fi
            done
          }

          check_health "${{ steps.config.outputs.tax_bot_url }}" "Tax bot" &
          PID_TAX=$!
          check_health "${{ steps.config.outputs.eng_bot_url }}" "Eng bot" &
          PID_ENG=$!

          FAILED=0
          wait $PID_TAX || FAILED=1
          wait $PID_ENG || FAILED=1
          exit $FAILED