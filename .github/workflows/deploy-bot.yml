name: deploy-bot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'bot-function/**'
      - 'config/**'
      - '.github/workflows/deploy-bot.yml'

jobs:
  deploy-bot-function:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app_name: func-fdryvnetgw-tax-bot-eastus
          - app_name: func-fdryvnetgw-eng-bot-eastus
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Prepare clean bot deploy package
        shell: bash
        run: |
          rm -rf .deploy/bot-package
          mkdir -p .deploy/bot-package
          cp bot-function/bot_app.py .deploy/bot-package/
          cp bot-function/host.json .deploy/bot-package/
          cp bot-function/requirements.txt .deploy/bot-package/
          cp -R bot-function/health .deploy/bot-package/
          cp -R bot-function/messages .deploy/bot-package/
          cp -R config .deploy/bot-package/
          find .deploy/bot-package -type d -name '__pycache__' -prune -exec rm -rf {} +
          find .deploy/bot-package -type d -name '.python_packages' -prune -exec rm -rf {} +
      - name: Deploy bot function
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app_name }}
          package: .deploy/bot-package
          scm-do-build-during-deployment: true
          track-status: false
      - name: Verify bot health endpoint
        shell: bash
        run: |
          max_attempts=6
          delay=15
          sleep 15
          for attempt in $(seq 1 $max_attempts); do
            if curl --fail --silent --show-error https://${{ matrix.app_name }}.azurewebsites.net/api/health; then
              echo "Health check passed"
              break
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Health check failed (attempt $attempt/$max_attempts), retrying in ${delay}s..."
              sleep $delay
            else
              echo "Health check failed after $max_attempts attempts"
              exit 1
            fi
          done