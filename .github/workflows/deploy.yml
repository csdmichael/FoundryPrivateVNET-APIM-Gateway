name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: terraform init
      - name: Import existing Azure resources
        shell: pwsh
        run: ./scripts/terraform-import-existing.ps1
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        if: github.ref != 'refs/heads/main'
        run: terraform plan -var-file=main.tfvars.json
      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=main.tfvars.json

  build-and-deploy-api:
    needs: terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
      - name: Package API
        run: |
          mkdir api-package
          cp -r api config api-package/
          cp requirements-api.txt api-package/requirements.txt
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.API_WEBAPP_NAME }}
          package: api-package

  build-and-deploy-ui:
    needs: terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install UI dependencies
        working-directory: ui
        run: npm ci
      - name: Build UI
        working-directory: ui
        run: npm run build
      - name: Deploy UI
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.UI_WEBAPP_NAME }}
          package: ui/www

  post-deploy:
    needs: [build-and-deploy-api, build-and-deploy-ui]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-deploy.txt
      - name: Configure APIM
        shell: pwsh
        run: ./scripts/configure-apim.ps1
      - name: Provision private Search and agents from source repo
        shell: pwsh
        run: ./scripts/provision-source-use-cases.ps1
      - name: Package Teams agents
        shell: pwsh
        run: ./scripts/package-teams-agents.ps1
      - name: Test sample prompts
        shell: pwsh
        env:
          APP_API_BASE_URL: ${{ secrets.APP_API_BASE_URL }}
        run: ./scripts/test-sample-prompts.ps1
