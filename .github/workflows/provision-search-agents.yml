name: provision-search-agents

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config/agent_config.json'
      - 'config/azure_resources.json'
      - 'config/document_config.json'
      - 'config/search_config.json'
      - 'scripts/ensure-foundry-search-connection.ps1'
      - 'scripts/provision-source-use-cases.ps1'
      - 'requirements-deploy.txt'
      - 'requirements.txt'
      - '.github/workflows/provision-search-agents.yml'

jobs:
  provision-search-agents:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-deploy.txt
      - name: Provision private Search assets from source repo
        shell: pwsh
        env:
          AUTO_ASSIGN_FOUNDRY_ROLE: 'false'
        run: ./scripts/provision-source-use-cases.ps1 -SearchOnly
      - name: Provision Foundry agents from source repo
        id: provision_agents
        shell: pwsh
        continue-on-error: true
        env:
          AUTO_ASSIGN_FOUNDRY_ROLE: 'false'
        run: ./scripts/provision-source-use-cases.ps1 -AgentsOnly
      - name: Summarize Foundry agent provisioning prerequisite
        if: steps.provision_agents.outcome == 'failure'
        shell: pwsh
        run: |
          @"
          ## Foundry agent provisioning skipped

          Search asset provisioning completed, but Foundry agent provisioning could not run because the GitHub Actions identity is missing `Azure AI User` on the Foundry account.

          Grant the role with an identity that has `Owner` or `User Access Administrator` on the Foundry account scope, then rerun this workflow:

          `az role assignment create --assignee-object-id 40d4ac00-c7cd-4e92-85af-8a56cf3c769b --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/ai-myaacoub/providers/Microsoft.CognitiveServices/accounts/002-ai-poc-private`
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Warning "Foundry agent provisioning skipped because the workflow identity is missing Azure AI User on the Foundry account."