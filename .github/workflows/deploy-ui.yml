name: deploy-ui

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ui/**'
      - 'config/**'
      - '.github/workflows/deploy-ui.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read config values
        id: config
        shell: bash
        run: |
          cfg="config/azure_resources.json"
          echo "resource_group=$(jq -r '.resource_group' $cfg)" >> "$GITHUB_OUTPUT"
          echo "ui_app_name=$(jq -r '.app_services.ui_name' $cfg)" >> "$GITHUB_OUTPUT"
          echo "ui_url=$(jq -r '.app_services.ui_url' $cfg)" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$(jq -r '"\(.apim.gateway_url)/\(.apim.api_path)/api"' $cfg)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install and build
        working-directory: ui
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Prepare deploy zip
        shell: bash
        run: |
          rm -rf .deploy/ui-package
          mkdir -p .deploy/ui-package
          cp -R ui/www .deploy/ui-package/
          cp ui/server.js .deploy/ui-package/
          cp ui/deploy-package.json .deploy/ui-package/package.json
          cd .deploy/ui-package
          npm install --production --no-audit --no-fund
          cd ..
          cd ui-package && zip -qr ../ui-package.zip . && cd ..

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service
        shell: bash
        run: |
          APP="${{ steps.config.outputs.ui_app_name }}"
          RG="${{ steps.config.outputs.resource_group }}"
          az webapp config appsettings set --name "$APP" --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false PORT=8080 \
              API_BASE_URL="${{ steps.config.outputs.api_base_url }}" --output none &
          az webapp config set --name "$APP" --resource-group "$RG" \
            --startup-file "node server.js" --output none &
          az webapp config appsettings delete --name "$APP" --resource-group "$RG" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE --output none 2>/dev/null &
          wait

      - name: Deploy via Kudu async zip
        shell: bash
        run: |
          source scripts/deploy-helpers.sh
          deploy_and_wait "${{ steps.config.outputs.ui_app_name }}" \
            "${{ steps.config.outputs.resource_group }}" \
            .deploy/ui-package.zip 600

      - name: Verify health
        shell: bash
        run: |
          max=6 delay=10; sleep 15
          for i in $(seq 1 $max); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.config.outputs.ui_url }}/")
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then echo "Health OK (HTTP $status)"; exit 0; fi
            [ $i -lt $max ] && echo "HTTP $status ($i/$max), retry ${delay}s..." && sleep $delay \
              || { echo "Health failed after $max attempts (HTTP $status)"; exit 1; }
          done
