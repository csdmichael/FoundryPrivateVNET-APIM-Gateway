name: deploy-ui

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ui/**'
      - 'config/**'
      - '.github/workflows/deploy-ui.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read config values
        id: config
        shell: bash
        run: |
          cfg="config/azure_resources.json"
          echo "resource_group=$(jq -r '.resource_group' $cfg)" >> "$GITHUB_OUTPUT"
          echo "ui_app_name=$(jq -r '.app_services.ui_name' $cfg)" >> "$GITHUB_OUTPUT"
          echo "ui_url=$(jq -r '.app_services.ui_url' $cfg)" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$(jq -r '"\(.apim.gateway_url)/\(.apim.api_path)/api"' $cfg)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install and build
        working-directory: ui
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Prepare deploy zip
        shell: bash
        run: |
          rm -rf .deploy/ui-package
          mkdir -p .deploy/ui-package
          cp -R ui/www .deploy/ui-package/
          cp ui/server.js .deploy/ui-package/
          cp ui/deploy-package.json .deploy/ui-package/package.json
          cd .deploy/ui-package
          npm install --production --no-audit --no-fund
          cd ..
          cd ui-package && zip -qr ../ui-package.zip . && cd ..

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure and deploy
        shell: bash
        run: |
          APP="${{ steps.config.outputs.ui_app_name }}"
          RG="${{ steps.config.outputs.resource_group }}"

          # Configure settings and deploy in parallel
          az webapp config appsettings set --name "$APP" --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false PORT=8080 \
              API_BASE_URL="${{ steps.config.outputs.api_base_url }}" \
            --output none &
          PID_SETTINGS=$!

          az webapp config set --name "$APP" --resource-group "$RG" \
            --startup-file "node server.js" --output none &
          PID_CONFIG=$!

          az webapp config appsettings delete --name "$APP" --resource-group "$RG" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE --output none 2>/dev/null &
          PID_DELETE=$!

          wait $PID_SETTINGS $PID_CONFIG
          wait $PID_DELETE || true

          # Deploy zip with retry for in-progress deployments
          for attempt in 1 2 3 4; do
            if az webapp deploy --name "$APP" --resource-group "$RG" \
                 --src-path .deploy/ui-package.zip --type zip --timeout 300 2>&1; then
              echo "UI deploy succeeded"
              break
            fi
            if [ $attempt -lt 4 ]; then
              echo "Deploy failed (attempt $attempt/4), waiting 30s for in-progress deployment..."
              sleep 30
            else
              echo "Deploy failed after 4 attempts"
              exit 1
            fi
          done

      - name: Verify health
        shell: bash
        run: |
          max_attempts=6
          delay=10
          sleep 15
          for attempt in $(seq 1 $max_attempts); do
            status=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.config.outputs.ui_url }}/)
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "Health check passed (HTTP $status)"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Health check failed HTTP $status (attempt $attempt/$max_attempts), retrying in ${delay}s..."
              sleep $delay
            else
              echo "Health check failed after $max_attempts attempts (HTTP $status)"
              exit 1
            fi
          done
          done
