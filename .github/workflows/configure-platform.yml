name: configure-platform

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config/azure_resources.json'
      - 'openapi/**'
      - 'scripts/configure-apim.ps1'
      - 'scripts/configure-foundry-ai-gateway.ps1'
      - 'requirements-deploy.txt'
      - '.github/workflows/configure-platform.yml'

jobs:
  configure-apim:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-deploy.txt
      - name: Configure APIM
        shell: pwsh
        run: ./scripts/configure-apim.ps1
      - name: Configure Foundry AI gateway via APIM
        shell: pwsh
        run: ./scripts/configure-foundry-ai-gateway.ps1