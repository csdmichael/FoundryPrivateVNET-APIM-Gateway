name: deploy-infra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
      - 'main.tfvars.json'
      - 'scripts/terraform-import-existing.ps1'
      - '.github/workflows/deploy-infra.yml'

env:
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_deploy_api: false
      TF_VAR_deploy_ui: false
      TF_VAR_bot_app_password: ${{ secrets.BOT_APP_PASSWORD }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Validate bot secret configured
        shell: bash
        run: |
          if [ -z "${TF_VAR_bot_app_password}" ]; then
            echo "BOT_APP_PASSWORD secret is not configured. Teams bot auth will fail without it."
            exit 1
          fi
      - name: Terraform init
        run: terraform init
      - name: Import existing Azure resources
        shell: pwsh
        run: ./scripts/terraform-import-existing.ps1
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        if: github.ref != 'refs/heads/main'
        run: terraform plan -var-file=main.tfvars.json
      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=main.tfvars.json