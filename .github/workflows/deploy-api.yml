name: deploy-api

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'config/**'
      - 'openapi/**'
      - 'requirements-api.txt'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read config values
        id: config
        shell: bash
        run: |
          cfg="config/azure_resources.json"
          echo "resource_group=$(jq -r '.resource_group' $cfg)" >> "$GITHUB_OUTPUT"
          echo "api_app_name=$(jq -r '.app_services.api_name' $cfg)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(jq -r '.app_services.api_url' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_name=$(jq -r '.apim.resource_id | split("/") | last' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_api_id=$(jq -r '.apim.backend_api_name' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_api_path=$(jq -r '.apim.api_path' $cfg)" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy zip
        shell: bash
        run: |
          rm -rf .deploy/api-package
          mkdir -p .deploy/api-package

          # Copy API server as root-level server.py (entrypoint for gunicorn)
          cp api/server.py .deploy/api-package/server.py
          cp requirements-api.txt .deploy/api-package/requirements.txt
          cp -R config .deploy/api-package/
          find .deploy/api-package -type d -name '__pycache__' -prune -exec rm -rf {} +

          cd .deploy/api-package && zip -qr ../api-package.zip . && cd ..

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to App Service
        shell: bash
        run: |
          APP="${{ steps.config.outputs.api_app_name }}"
          RG="${{ steps.config.outputs.resource_group }}"

          for attempt in 1 2 3 4; do
            if az webapp deploy --name "$APP" --resource-group "$RG" \
                 --src-path .deploy/api-package.zip --type zip --timeout 300 2>&1; then
              echo "API deploy succeeded"
              break
            fi
            if [ $attempt -lt 4 ]; then
              echo "Deploy failed (attempt $attempt/4), waiting 30s..."
              sleep 30
            else
              echo "Deploy failed after 4 attempts"
              exit 1
            fi
          done

      - name: Re-import OpenAPI spec into APIM
        shell: bash
        run: |
          RG="${{ steps.config.outputs.resource_group }}"
          APIM="${{ steps.config.outputs.apim_name }}"
          API_ID="${{ steps.config.outputs.apim_api_id }}"
          API_PATH="${{ steps.config.outputs.apim_api_path }}"
          BACKEND_URL="${{ steps.config.outputs.api_url }}"

          az apim api import \
            --resource-group "$RG" \
            --service-name "$APIM" \
            --path "$API_PATH" \
            --api-id "$API_ID" \
            --specification-format OpenApiJson \
            --specification-path openapi/foundry-privatevnet-app.openapi.json \
            --service-url "$BACKEND_URL" \
            --output none

          az apim api update \
            --resource-group "$RG" \
            --service-name "$APIM" \
            --api-id "$API_ID" \
            --subscription-required false \
            --output none

      - name: Verify API health
        shell: bash
        run: |
          max_attempts=8
          delay=15
          sleep 20
          for attempt in $(seq 1 $max_attempts); do
            if curl --fail --silent --show-error "${{ steps.config.outputs.api_url }}/api/health"; then
              echo ""
              echo "API health check passed"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Health check failed (attempt $attempt/$max_attempts), retrying in ${delay}s..."
              sleep $delay
            else
              echo "Health check failed after $max_attempts attempts"
              exit 1
            fi
          done
