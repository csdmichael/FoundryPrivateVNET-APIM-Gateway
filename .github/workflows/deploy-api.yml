name: deploy-api

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'config/**'
      - 'requirements-api.txt'
      - '.github/workflows/deploy-api.yml'

env:
  TF_IN_AUTOMATION: true

jobs:
  terraform-api:
    runs-on: ubuntu-latest
    env:
      TF_VAR_deploy_api: true
      TF_VAR_deploy_ui: false
      TF_VAR_bot_app_password: ${{ secrets.BOT_APP_PASSWORD }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Validate bot secret configured
        shell: bash
        run: |
          if [ -z "${TF_VAR_bot_app_password}" ]; then
            echo "BOT_APP_PASSWORD secret is not configured. Teams bot auth will fail without it."
            exit 1
          fi
      - name: Terraform init
        run: terraform init
      - name: Import existing Azure resources
        shell: pwsh
        run: ./scripts/terraform-import-existing.ps1
      - name: Terraform validate
        run: terraform validate
      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=main.tfvars.json
      - name: Terraform plan
        if: github.ref != 'refs/heads/main'
        run: terraform plan -var-file=main.tfvars.json

  build-and-deploy-api:
    needs: terraform-api
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
      - name: Package API
        run: |
          mkdir api-package
          cp -r api config api-package/
          cp requirements-api.txt api-package/requirements.txt
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.API_WEBAPP_NAME }}
          package: api-package