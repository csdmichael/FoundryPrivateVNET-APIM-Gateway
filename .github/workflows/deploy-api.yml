name: deploy-api

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'config/**'
      - 'openapi/**'
      - 'requirements-api.txt'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read config values
        id: config
        shell: bash
        run: |
          cfg="config/azure_resources.json"
          echo "resource_group=$(jq -r '.resource_group' $cfg)" >> "$GITHUB_OUTPUT"
          echo "api_app_name=$(jq -r '.app_services.api_name' $cfg)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(jq -r '.app_services.api_url' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_name=$(jq -r '.apim.resource_id | split("/") | last' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_api_id=$(jq -r '.apim.backend_api_name' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_api_path=$(jq -r '.apim.api_path' $cfg)" >> "$GITHUB_OUTPUT"
          echo "apim_gateway_url=$(jq -r '.apim.gateway_url' $cfg)" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy zip
        shell: bash
        run: |
          rm -rf .deploy/api-package
          mkdir -p .deploy/api-package
          cp api/server.py .deploy/api-package/server.py
          cp requirements-api.txt .deploy/api-package/requirements.txt
          cp -R config .deploy/api-package/
          find .deploy/api-package -type d -name '__pycache__' -prune -exec rm -rf {} +
          cd .deploy/api-package && zip -qr ../api-package.zip . && cd ..

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service
        shell: bash
        run: |
          APP="${{ steps.config.outputs.api_app_name }}"
          RG="${{ steps.config.outputs.resource_group }}"
          az webapp config appsettings set --name "$APP" --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false \
              WEBSITES_CONTAINER_START_TIME_LIMIT=600 \
            --output none

      - name: Deploy via Kudu async zip
        shell: bash
        run: |
          source scripts/deploy-helpers.sh
          deploy_and_wait "${{ steps.config.outputs.api_app_name }}" \
            "${{ steps.config.outputs.resource_group }}" \
            .deploy/api-package.zip 600

      - name: Re-import OpenAPI spec into APIM
        shell: bash
        run: |
          RG="${{ steps.config.outputs.resource_group }}"
          APIM="${{ steps.config.outputs.apim_name }}"
          API_ID="${{ steps.config.outputs.apim_api_id }}"
          API_PATH="${{ steps.config.outputs.apim_api_path }}"
          BACKEND_URL="${{ steps.config.outputs.api_url }}"

          az apim api import \
            --resource-group "$RG" --service-name "$APIM" \
            --path "$API_PATH" --api-id "$API_ID" \
            --specification-format OpenApiJson \
            --specification-path openapi/foundry-privatevnet-app.openapi.json \
            --service-url "$BACKEND_URL" --output none

          az apim api update \
            --resource-group "$RG" --service-name "$APIM" \
            --api-id "$API_ID" --subscription-required false --output none

      - name: Verify API health via APIM
        if: success() || failure()
        shell: bash
        run: |
          APIM_URL="${{ steps.config.outputs.apim_gateway_url }}/${{ steps.config.outputs.apim_api_path }}"
          max=6 delay=15; sleep 20
          for i in $(seq 1 $max); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$APIM_URL/api/health")
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then echo "API health OK via APIM (HTTP $status)"; exit 0; fi
            [ $i -lt $max ] && echo "HTTP $status ($i/$max), retry ${delay}s..." && sleep $delay \
              || { echo "API health check via APIM failed after $max attempts (HTTP $status). API is VNet-integrated; health check optional."; }
          done
